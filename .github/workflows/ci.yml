name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rules-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pyyaml
      - name: Check AGENTS.md and CLAUDE.md are in sync with rules YAML
        run: ./scripts/render.sh --check
