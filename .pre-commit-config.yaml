repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict]

  - repo: local
    hooks:
      - id: validate-patterns
        name: playbook red-line PATTERNS block compiles and is well-formed
        language: system
        entry: python3 scripts/validate-patterns.py
        files: ^(agentic-security-playbook\.md|scripts/validate-patterns\.py)$
        pass_filenames: false
        additional_dependencies: []

      - id: asr-id-consistency
        name: ASR ids in validation/cases.yml all exist in the playbook
        language: system
        entry: python3 scripts/check-asr-ids.py
        files: ^(agentic-security-playbook\.md|validation/cases\.yml|scripts/check-asr-ids\.py)$
        pass_filenames: false

      - id: render-policy-drift
        name: dist/agent-security-policy.md matches the playbook Installed block
        language: system
        entry: python3 scripts/render-policy.py --check
        files: ^(agentic-security-playbook\.md|dist/agent-security-policy\.md|scripts/render-policy\.py)$
        pass_filenames: false

      - id: render-policy-tests
        name: render-policy unit + doc-consistency tests
        language: python
        additional_dependencies: ["pytest==9.1.1"]
        entry: pytest tests/test_render_policy.py -q
        files: ^(scripts/render-policy\.py|dist/agent-security-policy\.md|agentic-security-playbook\.md|tests/test_render_policy\.py|README\.md)$
        pass_filenames: false

      - id: ruff
        name: ruff lint (scripts + tests)
        language: python
        additional_dependencies: ["ruff==0.15.18"]
        entry: ruff check
        files: ^(scripts|tests)/.*\.py$
